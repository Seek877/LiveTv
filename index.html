<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Live Channels</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        h1 {
            margin-bottom: 30px;
        }

        .button-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            width: 100%;
            max-width: 1000px;
        }

        button {
            padding: 20px;
            cursor: pointer;
            border: none;
            border-radius: 16px;
            background-color: #d1d1d1;
            transition: all 0.2s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        button:hover {
            background-color: #2c2c2c;
            transform: translateY(-4px);
        }

        button img {
            max-width: 120px;
            max-height: 60px;
            object-fit: contain;
        }

        button:active {
            transform: scale(0.97);
        }
    </style>
</head>
<body>

    <h1>Live TV Channels</h1>

    <div class="button-container">

        <button onclick="window.location.href='https://www.raiplay.it/dirette/rai1'">
            <img src="logos/rai1.png" alt="Rai 1">
        </button>

        </button>

        </button>
